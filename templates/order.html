{% extends "base.html" %}

{% block body %}

<main>
    <h2>Order From Our Menu</h2>

    <form method="POST" action="{{ url_for('order') }}">

        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="customer_name" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>

        <section>
            <h3>🥧 Desserts</h3>

            <div class="menu-section">

                <article class="menu-card">
                    <figure>
                        <img src="{{ url_for('static', filename='image/mantou.jpg') }}"
                            alt="Mantou Chinese steamed buns">

                        <figcaption>
                            <strong>Mantou 饅頭 - ${{ "%.2f"|format(menu_dict["Mantou"]) }}</strong>
                            <p>Soft, fluffy traditional steamed buns served warm.</p>

                            <cite>
                                <a href="https://en.wikipedia.org/wiki/Mantou"
                                target="_blank">
                                    Wikipedia
                                </a>
                            </cite>
                        </figcaption>
                    </figure>

                    <div class="qty-control">
                        <input type="number" name="mantou" id="mantou" value="0" min="0">
                        <button type="button" onclick="changeQty('mantou', -1)">−</button>
                        <button type="button" onclick="changeQty('mantou', 1)">+</button>
                    </div>
                </article>

                <article class="menu-card">
                    <figure>
                    <img src="{{ url_for('static', filename='image/snowflake_crisps.webp') }}"
                         alt="Snowflake crisps dessert">
                    <figcaption>
                        <strong>Snowflake Crisps 雪花酥 - ${{ "%.2f"|format(menu_dict["Snowflake Crisps"]) }}</strong>
                        <p>Chewy milk nougat squares with nuts and dried fruit.</p>
                        <cite>
                            <a href="https://www.bearnakedfood.com/2022/01/28/no-bake-snowflake-crisp-milk-nougat/"
                               target="_blank">
                                Bear Naked Food
                            </a>
                        </cite>
                    </figcaption>
                </figure>

                    <div class="qty-control">
                        
                        <input type="number" name="snowflake" id="snowflake" value="0" min="0">
                        <button type="button" onclick="changeQty('snowflake', -1)">−</button>
                        <button type="button" onclick="changeQty('snowflake', 1)">+</button>
                    </div>
                </article>

                <article class="menu-card">
                    <figure>
                        <img src="{{ url_for('static', filename='image/youtiao.webp') }}"
                            alt="Youtiao Chinese fried dough">
                        <figcaption>
                            <strong>Youtiao 油条 - ${{ "%.2f"|format(menu_dict["Youtiao"]) }}</strong>
                            <p>Crispy golden fried dough sticks, perfect with tea.</p>
                            <cite>
                                <a href="https://www.chinasichuanfood.com/youtiao-chinese-doughnut/"
                                target="_blank">
                                    China Sichuan Food
                                </a>
                            </cite>
                        </figcaption>
                    </figure>
                    <div class="qty-control">
                        <input type="number" name="youtiao" id="youtiao" value="0" min="0">
                        <button type="button" onclick="changeQty('youtiao', -1)">−</button>                        
                        <button type="button" onclick="changeQty('youtiao', 1)">+</button>
                    </div>
                </article>

            </div>
        </section>


        <section>
            <h3>🍵 Drinks</h3>

            <div class="menu-section">

                <article class="menu-card">
                    <figure>
                        <img src="{{ url_for('static', filename='image/banana_matcha.jfif') }}"
                            alt="Banana cream matcha latte">
                        <figcaption>
                            <strong>Banana Cream Matcha Latte - ${{ "%.2f"|format(menu_dict["Banana Matcha"]) }}</strong>
                            <p>Rich matcha blended with banana cream and milk.</p>
                            <cite>
                                <a href="https://www.mochimommy.com/banana-cream-matcha/"
                                target="_blank">
                                    Mochi Mommy
                                </a>
                            </cite>
                        </figcaption>
                    </figure>

                    <div class="qty-control">
                        <input type="number" name="banana" id="banana" value="0" min="0">
                        <button type="button" onclick="changeQty('banana', -1)">−</button>
                        <button type="button" onclick="changeQty('banana', 1)">+</button>
                    </div>
                </article>

                <article class="menu-card">
                    <figure>
                        <img src="{{ url_for('static', filename='image/cheesefoam_matcha.jfif') }}"
                            alt="Cheesefoam matcha latte">
                        <figcaption>
                            <strong>Cheesefoam Matcha Latte - ${{ "%.2f"|format(menu_dict["Cheesefoam Matcha"]) }}</strong>
                            <p>Premium matcha topped with creamy sweet cheese foam.</p>
                            <cite>
                                <a href="https://aiya-america.com/cream-cheese-foam-matcha-latte/"
                                target="_blank">
                                    Aiya America
                                </a>
                            </cite>
                        </figcaption>
                    </figure>

                    <div class="qty-control">
                        <input type="number" name="cheesefoam" id="cheesefoam" value="0" min="0">
                        <button type="button" onclick="changeQty('cheesefoam', -1)">−</button>
                        <button type="button" onclick="changeQty('cheesefoam', 1)">+</button>
                    </div>
                </article>

                <article class="menu-card">
                    <figure>
                        <img src="{{ url_for('static', filename='image/strawberry_matcha.jfif') }}"
                            alt="Strawberry matcha latte">
                        <figcaption>
                            <strong>Strawberry Matcha Latte - ${{ "%.2f"|format(menu_dict["Strawberry Matcha"]) }}</strong>
                            <p>Fresh strawberry puree layered with ceremonial matcha.</p>
                            <cite>
                                <a href="https://christieathome.com/blog/strawberry-matcha-latte/"
                                target="_blank">
                                    Christie at Home
                                </a>
                            </cite>
                        </figcaption>
                    </figure>

                    <div class="qty-control">
                        <input type="number" name="strawberry" id="strawberry" value="0" min="0">
                        <button type="button" onclick="changeQty('strawberry', -1)">−</button>
                        <button type="button" onclick="changeQty('strawberry', 1)">+</button>
                    </div>
                </article>

            </div>
        </section>

        <button type="submit" style="margin-top: 30px;">Place Order</button>

    </form>
</main>

<script>
function changeQty(id, amount) {
    let input = document.getElementById(id);
    let current = parseInt(input.value) || 0;
    let newValue = current + amount;
    if (newValue < 0) newValue = 0;
    input.value = newValue;
}
</script>

{% endblock %}
